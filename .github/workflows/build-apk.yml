name: Build Luna VPN APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Check directory structure
      run: |
        echo "=== Root directory ==="
        ls -la
        echo ""
        echo "=== Looking for V2rayNG ==="
        find . -maxdepth 2 -name "*2ray*" -type d
        echo ""
        echo "=== Checking for gradlew ==="
        find . -name "gradlew" -type f

    - name: Grant execute permission for gradlew
      run: |
        cd V2rayNG/V2rayNG
        chmod +x gradlew

    - name: Build Debug APK
      run: |
        cd V2rayNG/V2rayNG
        ./gradlew assembleDebug --stacktrace

    - name: Build Release APK (unsigned)
      run: |
        cd V2rayNG/V2rayNG
        ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: luna-vpn-debug
        path: V2rayNG/V2rayNG/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: luna-vpn-release
        path: V2rayNG/V2rayNG/app/build/outputs/apk/release/*.apk
        retention-days: 30
      continue-on-error: true

    - name: Get APK info
      run: |
        echo "=== Build completed ==="
        echo "Debug APK:"
        ls -lh V2rayNG/V2rayNG/app/build/outputs/apk/debug/*.apk || echo "No debug APK found"
        echo ""
        echo "Release APK:"
        ls -lh V2rayNG/V2rayNG/app/build/outputs/apk/release/*.apk || echo "No release APK found"

name: Build Luna VPN APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Get AndroidLibXrayLite version
      id: get-version
      run: |
        cd v2rayNG/AndroidLibXrayLite
        XRAY_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "2.0.0")
        echo "XRAY_TAG=$XRAY_TAG" >> $GITHUB_ENV
        echo "Using AndroidLibXrayLite tag: $XRAY_TAG"

    - name: Download libv2ray.aar
      uses: robinraju/release-downloader@v1.11
      with:
        repository: '2dust/AndroidLibXrayLite'
        tag: ${{ env.XRAY_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: v2rayNG/V2rayNG/app/libs/

    - name: Grant execute permission for gradlew
      run: |
        cd v2rayNG/V2rayNG
        chmod +x gradlew

    - name: Build Debug APK
      run: |
        cd v2rayNG/V2rayNG
        ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: luna-vpn-debug
        path: v2rayNG/V2rayNG/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK
      run: |
        cd v2rayNG/V2rayNG
        ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: luna-vpn-release
        path: v2rayNG/V2rayNG/app/build/outputs/apk/release/*.apk
        retention-days: 30
      continue-on-error: true

    - name: List APK files
      if: always()
      run: |
        echo "=== APK files ==="
        find v2rayNG -name "*.apk" -type f || echo "No APK found"

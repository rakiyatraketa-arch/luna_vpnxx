name: Build Luna VPN APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Check directory structure
      run: |
        echo "=== Root directory ==="
        ls -la
        echo ""
        echo "=== Submodules status ==="
        git submodule status
        echo ""
        echo "=== Looking for V2rayNG/v2rayNG ==="
        ls -la V2rayNG/ || echo "V2rayNG not found"
        ls -la v2rayNG/ || echo "v2rayNG not found"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find and build APK
      run: |
        # Ищем правильную папку с gradlew
        if [ -f "V2rayNG/V2rayNG/gradlew" ]; then
          echo "Found gradlew in V2rayNG/V2rayNG"
          cd V2rayNG/V2rayNG
        elif [ -f "v2rayNG/V2rayNG/gradlew" ]; then
          echo "Found gradlew in v2rayNG/V2rayNG"
          cd v2rayNG/V2rayNG
        else
          echo "ERROR: gradlew not found!"
          find . -name "gradlew" -type f
          exit 1
        fi

        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Find and upload Debug APK
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f

    - name: Upload Debug APK (V2rayNG path)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: luna-vpn-debug-V2rayNG
        path: V2rayNG/V2rayNG/app/build/outputs/apk/debug/*.apk
        retention-days: 30
      continue-on-error: true

    - name: Upload Debug APK (v2rayNG path)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: luna-vpn-debug-v2rayNG
        path: v2rayNG/V2rayNG/app/build/outputs/apk/debug/*.apk
        retention-days: 30
      continue-on-error: true

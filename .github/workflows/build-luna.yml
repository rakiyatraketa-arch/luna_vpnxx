name: Build Luna VPN APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache@v4
      with:
        path: libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      run: |
        bash compile-hevtun.sh

    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache@v4
      with:
        path: libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Copy libhevtun
      run: |
        mkdir -p V2rayNG/app/src/main/jniLibs
        cp -r libs/* V2rayNG/app/src/main/jniLibs/

    - name: Fetch AndroidLibXrayLite tag
      run: |
        pushd AndroidLibXrayLite
        XRAY_TAG=$(git describe --tags --abbrev=0)
        echo "XRAY_TAG=$XRAY_TAG" >> $GITHUB_ENV
        popd

    - name: Download libv2ray.aar
      uses: robinraju/release-downloader@v1
      with:
        repository: '2dust/AndroidLibXrayLite'
        tag: ${{ env.XRAY_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: 'V2rayNG/app/libs'

    - name: Download geo assets (geosite.dat + geoip.dat)
      run: |
        ASSETS=V2rayNG/app/src/main/assets
        mkdir -p "$ASSETS"
        curl -fsSL -o "$ASSETS/geoip.dat" \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
        curl -fsSL -o "$ASSETS/geosite.dat" \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
        ls -la "$ASSETS"/*.dat

    - name: Grant execute permission for gradlew
      run: chmod +x V2rayNG/gradlew

    - name: Build APK (fdroid debug)
      run: |
        cd V2rayNG
        ./gradlew assembleFdroidDebug --no-daemon --stacktrace

    - name: List built APKs
      run: |
        find V2rayNG/app/build/outputs/apk -name "*.apk" -print

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: luna-vpn-apk
        path: V2rayNG/app/build/outputs/apk/**/*.apk
        if-no-files-found: error
        retention-days: 30
